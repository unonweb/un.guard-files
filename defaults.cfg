# ALERT
ALERT_MAIL=1
ALERT_MAIL_TO="unonweb@posteo.de"
ALERT_MAIL_SUBJECT="[$(hostname)] [${APP_NAME}]"
# COOLDOWN
# Seconds to wait before allowing another alert for the same file
COOLDOWN_SECONDS=60
# FILES
WATCH_FILES=(
    "/root/.aws/credentials"
)
# LOG
LOG_LVL=5
LOG_TO_FILE=0
LOG_FILE="${SCRIPT_PARENT}/log.txt"
LOG_TO_CONSOLE=1
LOG_TO_CONSOLE_WITH_LVL=1